name: Build and Test Playground

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # වේගවත් කිරීමට cache භාවිතා කරයි

      - name: Install Dependencies
        run: npm install

      - name: Type Check (Lint)
        run: npm run lint # TypeScript errors තිබේදැයි බලයි

      - name: Build Project
        run: npm run build # Vite හරහා build එක සාදයි
